# ---------------------------------------------------------------------------------------
# 🏭 OpenFactory App configuration file for the SHDR Gateway
#
# Deploy with:
#   ofa device up app_shdr_gateway.yml
# ---------------------------------------------------------------------------------------
# Environment variables:
#
# Optional:
#   SHDR_GATEWAY_LOG_LEVEL    Log level (default: INFO)
#
# ---------------------------------------------------------------------------------------

apps:

  shdr-gateway-1:
    uuid: SHDR-GATEWAY-1
    image: shdr-gateway
    environment:
      - LOG_LEVEL=${SHDR_GATEWAY_LOG_LEVEL:-DEBUG}
    routing:
      expose: true
      port: 4000
      hostname: shdr-gateway
    networks:
      - factory-net
