# ---------------------------------------------------------------------------------------
# 🏭 OpenFactory App configuration file for the OPCUA Gateway
#
# Deploy with:
#   ofa device up app_shdr_gateway.yml
# ---------------------------------------------------------------------------------------
# Environment variables:
#
# Optional:
#   SHDR_GATEWAY_LOG_LEVEL    Log level (default: INFO)
#
# ---------------------------------------------------------------------------------------

apps:

  shdr-ocpua-1:
    uuid: OPCUA-GATEWAY-1
    image: opcua-gateway
    environment:
      - LOG_LEVEL=${OPCUA_GATEWAY_LOG_LEVEL:-INFO}
      - PROMETHEUS_DISABLE_CREATED_SERIES=true
    routing:
      expose: true
      port: 4000
      hostname: opcua-gateway-1
    networks:
      - factory-net

  shdr-ocpua-2:
    uuid: OPCUA-GATEWAY-2
    image: opcua-gateway
    environment:
      - LOG_LEVEL=${OPCUA_GATEWAY_LOG_LEVEL:-DEBUG}
      - PROMETHEUS_DISABLE_CREATED_SERIES=true
    routing:
      expose: true
      port: 4000
      hostname: opcua-gateway-2
    networks:
      - factory-net
